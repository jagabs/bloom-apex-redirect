<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <link rel="canonical" href="https://www.bloomalliedhealththerapyco.com.au/">
  <meta name="robots" content="noindex">
  <!-- Preserve the path/query when redirecting apex -> www -->
  <script>
    (function () {
      var target = "https://www.bloomalliedhealththerapyco.com.au"
        + window.location.pathname
        + window.location.search
        + window.location.hash;
      window.location.replace(target);
    })();
  </script>
  <!-- Fallback for no-JS: send to www root -->
  <meta http-equiv="refresh" content="0; url=https://www.bloomalliedhealththerapyco.com.au/">
</head>
<body>
  <p>Redirecting to <a href="https://www.bloomalliedhealththerapyco.com.au/">www.bloomalliedhealththerapyco.com.au</a>…</p>
</body>
</html>
